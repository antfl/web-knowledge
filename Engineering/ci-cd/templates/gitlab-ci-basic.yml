stages:
  - test
  - build
  - deploy

test:
  stage: test
  image: node:16
  script:
    - npm install
    - npm test
  only:
    - main
    - merge_requests

build:
  stage: build
  image: node:16
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache lftp
    - lftp -u $FTP_USER,$FTP_PASS -e "mirror -R dist/ /public_html/; quit" $FTP_HOST
  only:
    - main